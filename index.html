<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Wall Dashboard</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
</head>
<body>

    <div class="dashboard-container">
        <main class="calendar-section">
            <header class="controls">
                <h1>Our Family Calendar</h1>
                <button id="auth_button" onclick="handleAuthClick()">Connect Google Account</button>
            </header>

            <div class="calendar-header">
                <div>Mon</div>
                <div>Tue</div>
                <div>Wed</div>
                <div>Thu</div>
                <div>Fri</div>
                <div>Sat</div>
                <div>Sun</div>
            </div>
            
            <div id="calendar-grid" class="calendar-grid">
                </div>
        </main>

        <aside class="task-sidebar">
            <h2>Family Tasks</h2>
            <div id="task-lists-container">
                <p>Login to see tasks...</p>
            </div>
        </aside>
    </div>

    <button onclick="openEventModal()" style="background-color: #0f9d58;">+ Add Event</button>

    <div id="eventModal" class="modal">
        <div class="modal-content">
            <h2>Add Family Event</h2>
            <input type="text" id="eventSummary" placeholder="Event Name (e.g. Soccer Practice)" required>
            <select id="eventCalendar">
                </select>
            <div class="time-input">
                <label>Date: <input type="date" id="eventDate"></label>
                <label>Time: <input type="time" id="eventTime"></label>
            </div>
            <div class="modal-buttons">
                <button onclick="closeEventModal()" style="background-color: #888;">Cancel</button>
                <button onclick="submitEvent()">Add to Calendar</button>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
