<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Wall Dashboard</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
</head>
<body>

    <div class="dashboard-container">
        <main class="calendar-section">
            <header class="controls">
                <h1>Our Family Calendar</h1>
                <div class="button-group">
                    <button onclick="openEventModal()" style="background-color: #0f9d58; margin-right: 10px;">+ Add Event</button>
                    <button id="auth_button" onclick="handleAuthClick()">Connect Google Account</button>
                </div>
            </header>

            <div class="calendar-header">
                <div>Mon</div>
                <div>Tue</div>
                <div>Wed</div>
                <div>Thu</div>
                <div>Fri</div>
                <div>Sat</div>
                <div>Sun</div>
            </div>
            
            <div id="calendar-grid" class="calendar-grid">
                </div>
        </main>

        <aside class="task-sidebar">
            <h2>Family Tasks</h2>
            <div id="task-lists-container">
                <p>Login to see tasks...</p>
            </div>
        </aside>
    </div>

    /* ==========================================
       POP-UP MODAL (Hidden by default)
       ========================================== */
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <h2>Add Family Event</h2>
            
            <label for="eventSummary">Event Name</label>
            <input type="text" id="eventSummary" placeholder="e.g. Soccer Practice" required>
            
            <label for="eventCalendar">Who is this for?</label>
            <select id="eventCalendar">
                </select>

            <div class="time-input">
                <div>
                    <label>Date</label>
                    <input type="date" id="eventDate">
                </div>
                <div>
                    <label>Time (Optional)</label>
                    <input type="time" id="eventTime">
                </div>
            </div>

            <div class="modal-buttons">
                <button onclick="closeEventModal()" style="background-color: #888;">Cancel</button>
                <button onclick="submitEvent()" style="background-color: #4285f4;">Add to Calendar</button>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
