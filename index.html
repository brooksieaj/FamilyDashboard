<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Hub - Calendar</title>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Shared Stylesheet -->
    <link rel="stylesheet" href="style.css">
    <!-- Shared Core Application Script -->
    <script src="script.js" defer></script>
</head>
<body>
    <div class="dashboard-container">
        
        <!-- SIDEBAR NAVIGATION DRAWER -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <button id="sidebarToggle" class="icon-btn"><i class="fas fa-bars"></i></button>
                <span class="sidebar-title menu-text">Family Hub</span>
            </div>
            <ul class="sidebar-menu">
                <li class="active"><a href="index.html"><i class="fas fa-calendar-alt"></i><span class="menu-text">Calendar</span></a></li>
                <li><a href="meals.html"><i class="fas fa-utensils"></i><span class="menu-text">Meals</span></a></li>
                <li><a href="shopping.html"><i class="fas fa-shopping-basket"></i><span class="menu-text">Shopping List</span></a></li>
                <li><a href="settings.html"><i class="fas fa-cog"></i><span class="menu-text">Settings</span></a></li>
            </ul>
        </aside>

        <!-- MAIN WORK AREA CONTENT -->
        <main class="main-content">
            <header class="content-header" style="padding: 20px; display: flex; align-items: center; gap: 12px;">
                <button id="contentMenuToggle" class="icon-btn hide-on-desktop"><i class="fas fa-bars"></i></button>
                <h1>Family Calendar</h1>
            </header>

            <!-- Calendar Grid Frame Workspace -->
            <section class="calendar-section">
                <div class="controls">
                    <div class="button-group">
                        <button id="prevMonthBtn">Previous</button>
                        <button id="nextMonthBtn" style="margin-left: 10px;">Next</button>
                    </div>
                    <span id="monthYearDisplay" style="font-size: 1.5rem; font-weight: bold; color: #333;"></span>
                    <button id="addEventBtn"><i class="fas fa-plus"></i> Add Event</button>
                </div>

                <div class="calendar-header">
                    <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                </div>
                <div id="calendarGrid" class="calendar-grid">
                    <!-- Days loaded dynamically -->
                </div>
            </section>
        </main>

    </div>
</body>
</html>
