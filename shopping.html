<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Dashboard - Shopping List</title>
    <!-- FontAwesome for the checkmarks and delete icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h2>Family Hub</h2>
                <button id="sidebarToggle" class="icon-btn"><i class="fas fa-bars"></i></button>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html"><i class="fas fa-calendar-alt"></i> <span>Calendar</span></a>
                <a href="meals.html"><i class="fas fa-utensils"></i> <span>Meal Planner</span></a>
                <a href="shopping.html" class="active"><i class="fas fa-shopping-basket"></i> <span>Shopping List</span></a>
            </nav>
        </aside>

        <!-- Main Content Area Wrapper -->
        <main class="content-area">
            <header class="content-header">
                <button id="contentMenuToggle" class="icon-btn mobile-only"><i class="fas fa-bars"></i></button>
                <h1>Weekly Grocery & Shopping List</h1>
            </header>

            <!-- Target container for engine verification -->
            <div id="shopping-list-container" class="shopping-content-area">
                
                <!-- Input Controls Bar -->
                <div class="shopping-input-group" style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <input 
                        type="text" 
                        id="shopping-item-input" 
                        placeholder="Add an item (e.g., Almond Milk, Apples)..." 
                        style="flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;"
                    >
                    <button 
                        id="add-item-btn" 
                        style="padding: 12px 20px; background-color: #4285f4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;"
                    >
                        <i class="fas fa-plus"></i> Add
                    </button>
                </div>

                <!-- Action Controls Row -->
                <div class="shopping-actions" style="margin-bottom: 15px; text-align: right;">
                    <button 
                        id="clear-completed-btn" 
                        style="padding: 8px 15px; background-color: #f4f4f4; color: #333; border: 1px solid #ddd; border-radius: 4px; cursor: pointer;"
                    >
                        <i class="fas fa-broom"></i> Clear Completed
                    </button>
                </div>

                <!-- Dynamic Target List Stack -->
                <ul 
                    id="shopping-list" 
                    style="list-style: none; padding: 0; margin: 0; background: white; border: 1px solid #ddd; border-radius: 4px;"
                >
                    <!-- Script.js will dynamically paint list items here -->
                </ul>

            </div>
        </main>
    </div>

    <!-- External Script Pipeline Ingestion -->
    <script src="script.js"></script>
</body>
</html>
