<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Board - Shopping List</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .shopping-container {
            background-color: #f0f2f5;
            border: 2px solid #333;
            border-radius: 8px;
            flex-grow: 1;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow: hidden;
        }

        /* Input Form Bar */
        .shopping-form {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .shopping-input {
            flex-grow: 1;
            border: 1px dashed #ccc;
            border-radius: 6px;
            padding: 12px 16px;
            font-family: inherit;
            font-size: 1.3rem;
            font-weight: 600;
            outline: none;
            box-sizing: border-box;
            background-color: #ffffff;
        }

        .shopping-input:focus {
            border: 2px solid #4285f4;
        }

        .add-item-btn {
            background-color: #1a73e8;
            font-size: 1.1rem;
            padding: 0 24px;
            border-radius: 6px;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        .add-item-btn:hover { background-color: #1557b0; }

        /* List View Workspace */
        .shopping-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .shopping-item {
            background: white;
            padding: 15px 20px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #e0e2e6;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }

        .shopping-item:hover {
            background-color: #f8f9fa;
        }

        .shopping-item.checked {
            background-color: #f1f3f4;
            opacity: 0.6;
        }

        .shopping-item.checked .item-text {
            text-decoration: line-through;
            color: #5f6368;
        }

        .checkbox-icon {
            font-size: 1.4rem;
            color: #5f6368;
            width: 24px;
        }

        .shopping-item.checked .checkbox-icon {
            color: #1a73e8;
        }

        .item-text {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
        }

        .clear-bought-btn {
            background-color: #5f6368;
            font-size: 1.1rem;
            padding: 10px 20px;
        }
        .clear-bought-btn:hover { background-color: #45474a; }
    </style>
</head>
<body>

    <!-- Retractable Side Menu -->
    <nav id="sidebar" class="sidebar collapsed">
        <div class="sidebar-header">
            <button id="sidebarToggle" class="icon-btn"><i class="fas fa-bars"></i></button>
            <span class="sidebar-title">Family Hub</span>
        </div>
        <ul class="sidebar-menu">
            <li>
                <a href="index.html">
                    <i class="fas fa-calendar-alt"></i>
                    <span class="menu-text">Calendar</span>
                </a>
            </li>
            <li>
                <a href="meals.html">
                    <i class="fas fa-utensils"></i>
                    <span class="menu-text">Meals</span>
                </a>
            </li>
            <li class="active">
                <a href="shopping.html">
                    <i class="fas fa-shopping-basket"></i>
                    <span class="menu-text">Shopping List</span>
                </a>
            </li>
        </ul>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content" style="height: 100vh; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column;">
        <header class="controls" style="margin-bottom: 15px; flex-shrink: 0;">
            <div class="header-left">
                <button id="contentMenuToggle" class="icon-btn hide-on-desktop"><i class="fas fa-bars"></i></button>
                <h1>Shopping List</h1>
            </div>
            <div class="button-group">
                <button class="clear-bought-btn" onclick="clearCheckedItems()"><i class="fas fa-check-double" style="margin-right: 8px;"></i>Clear Checked</button>
            </div>
        </header>

        <!-- Main Core Dashboard Interface -->
        <div class="shopping-container">
            <form class="shopping-form" id="itemForm" onsubmit="addNewItem(event)">
                <input type="text" id="itemInput" class="shopping-input" placeholder="Add an item (e.g., Milk, Bread)..." autocomplete="off">
                <button type="submit" class="add-item-btn">+ Add</button>
            </form>

            <ul class="shopping-list" id="shoppingList">
                <!-- Dynamically populated rows -->
            </ul>
        </div>
    </main>

    <script>
        // Sidebar controls
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('sidebarToggle');
        const contentToggleBtn = document.getElementById('contentMenuToggle');

        function toggleSidebar() {
            sidebar.classList.toggle('collapsed');
        }
        toggleBtn.addEventListener('click', toggleSidebar);
        contentToggleBtn.addEventListener('click', toggleSidebar);

        // Core List Application State Logic
        let shoppingItems = JSON.parse(localStorage.getItem('familyShoppingItems')) || [];

        function renderList() {
            const listEl = document.getElementById('shoppingList');
            listEl.innerHTML = '';

            shoppingItems.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = `shopping-item ${item.checked ? 'checked' : ''}`;
                li.onclick = () => toggleItem(index);

                li.innerHTML = `
                    <i class="${item.checked ? 'fas fa-check-square' : 'far fa-square'} checkbox-icon"></i>
                    <span class="item-text">${item.text}</span>
                `;
                listEl.appendChild(li);
            });
        }

        function addNewItem(e) {
            e.preventDefault();
            const input = document.getElementById('itemInput');
            const text = input.value.trim();
            
            if (text) {
                shoppingItems.push({ text: text, checked: false });
                saveAndRender();
                input.value = '';
            }
        }

        function toggleItem(index) {
            shoppingItems[index].checked = !shoppingItems[index].checked;
            saveAndRender();
        }

        function clearCheckedItems() {
            shoppingItems = shoppingItems.filter(item => !item.checked);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('familyShoppingItems', JSON.stringify(shoppingItems));
            renderList();
        }

        // Run on initial load window cycle
        window.onload = renderList;
    </script>
</body>
</html>
