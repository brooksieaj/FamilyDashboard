<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Shopping List</title>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Shared Stylesheet -->
    <link rel="stylesheet" href="style.css">
    <!-- Shared Core Application Script -->
    <script src="script.js" defer></script>
</head>
<body>
    <div class="dashboard-container">
        
        <!-- SIDEBAR NAVIGATION DRAWER -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <button id="sidebarToggle" class="icon-btn"><i class="fas fa-bars"></i></button>
                <span class="sidebar-title menu-text">Family Hub</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html"><i class="fas fa-calendar-alt"></i><span class="menu-text">Calendar</span></a></li>
                <li><a href="meals.html"><i class="fas fa-utensils"></i><span class="menu-text">Meals</span></a></li>
                <li class="active"><a href="shopping.html"><i class="fas fa-shopping-basket"></i><span class="menu-text">Shopping List</span></a></li>
                <li><a href="settings.html"><i class="fas fa-cog"></i><span class="menu-text">Settings</span></a></li>
            </ul>
        </aside>

        <!-- MAIN WORK AREA CONTENT -->
        <main class="main-content">
            <header class="content-header" style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
                <div class="header-left">
                    <button id="contentMenuToggle" class="icon-btn hide-on-desktop"><i class="fas fa-bars"></i></button>
                    <h1>Shopping List</h1>
                </div>
                <div class="button-group">
                    <button class="clear-bought-btn" onclick="clearChecked()"><i class="fas fa-trash-alt"></i> Clear Checked</button>
                </div>
            </header>

            <section class="shopping-section">
                <form class="shopping-form" onsubmit="addNewItem(event)">
                    <input type="text" id="itemInput" class="shopping-input" placeholder="Add an item..." autocomplete="off">
                    <button type="submit" class="add-item-btn"><i class="fas fa-plus"></i> Add</button>
                </form>

                <ul id="shoppingList" class="shopping-list">
                    <!-- Dynamic Items render here -->
                </ul>
            </section>
        </main>

    </div>

    <script>
        // Core List Application State Logic
        let shoppingItems = JSON.parse(localStorage.getItem('familyShoppingItems')) || [];

        // Sidebar Collapse Logic to support layout states defined in style.css
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const contentMenuToggle = document.getElementById('contentMenuToggle');

        function toggleSidebar() {
            sidebar.classList.toggle('collapsed');
        }

        if (sidebarToggle) sidebarToggle.addEventListener('click', toggleSidebar);
        if (contentMenuToggle) contentMenuToggle.addEventListener('click', toggleSidebar);

        // Core Render Function
        function renderList() {
            const listEl = document.getElementById('shoppingList');
            if (!listEl) return;
            listEl.innerHTML = '';
            
            shoppingItems.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = `shopping-item ${item.checked ? 'checked' : ''}`;
                li.onclick = () => toggleItem(index);
                
                li.innerHTML = `
                    <div class="checkbox-container">
                        <div class="custom-checkbox">
                            <i class="fas fa-check"></i>
                        </div>
                        <span class="item-text">${item.text}</span>
                    </div>
                `;
                listEl.appendChild(li);
            });
        }

        function addNewItem(e) {
            e.preventDefault();
            const input = document.getElementById('itemInput');
            const text = input.value.trim();
            if (text) {
                shoppingItems.push({ text: text, checked: false });
                saveAndRender();
                input.value = '';
            }
        }

        function toggleItem(index) {
            shoppingItems[index].checked = !shoppingItems[index].checked;
            saveAndRender();
        }

        function clearChecked() {
            shoppingItems = shoppingItems.filter(item => !item.checked);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('familyShoppingItems', JSON.stringify(shoppingItems));
            renderList();
        }

        // Initial setup execution
        renderList();
    </script>
</body>
</html>
