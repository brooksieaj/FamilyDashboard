<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Shopping List</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Custom layout overrides specifically for the shopping list page */
        .shopping-section {
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow: hidden;
        }

        /* Input Form Bar */
        .shopping-form {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .shopping-input {
            flex-grow: 1;
            border: 1px dashed #ccc;
            border-radius: 6px;
            padding: 12px 16px;
            font-family: inherit;
            font-size: 1.3rem;
            font-weight: 600;
            outline: none;
            box-sizing: border-box;
            background-color: #ffffff;
        }

        .shopping-input:focus {
            border: 2px solid #4285f4;
        }

        .add-item-btn {
            background-color: #1a73e8;
            font-size: 1.1rem;
            padding: 0 24px;
            border-radius: 6px;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        .add-item-btn:hover { background-color: #1557b0; }

        /* List View Workspace */
        .shopping-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .shopping-item {
            background: white;
            padding: 15px 20px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #e0e0e0;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .shopping-item:hover {
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-color: #ccc;
        }

        .shopping-item.checked {
            background-color: #f8f9fa;
            border-color: #e0e0e0;
        }

        .shopping-item.checked .item-text {
            text-decoration: line-through;
            color: #888;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .custom-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid #5f6368;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .shopping-item.checked .custom-checkbox {
            background-color: #1a73e8;
            border-color: #1a73e8;
        }

        .custom-checkbox i {
            color: white;
            font-size: 0.8rem;
            display: none;
        }

        .shopping-item.checked .custom-checkbox i {
            display: block;
        }

        .item-text {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
        }

        .clear-bought-btn {
            background-color: #5f6368;
            font-size: 1.1rem;
            padding: 10px 20px;
        }

        .clear-bought-btn:hover { background-color: #45474a; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <button id="sidebarToggle" class="icon-btn"><i class="fas fa-bars"></i></button>
                <h1 class="brand menu-text">Family Hub</h1>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html"><i class="fas fa-calendar-alt"></i><span class="menu-text">Calendar</span></a></li>
                <li><a href="meals.html"><i class="fas fa-utensils"></i><span class="menu-text">Meals</span></a></li>
                <li class="active"><a href="shopping.html"><i class="fas fa-shopping-basket"></i><span class="menu-text">Shopping List</span></a></li>
                <li><a href="settings.html"><i class="fas fa-cog"></i><span class="menu-text">Settings</span></a></li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <div class="header-left">
                    <button id="contentMenuToggle" class="icon-btn hide-on-desktop"><i class="fas fa-bars"></i></button>
                    <h2>Shopping List</h2>
                </div>
                <div class="button-group">
                    <button class="header-btn clear-bought-btn" onclick="clearChecked()"><i class="fas fa-trash-alt"></i> Clear Checked</button>
                </div>
            </header>

            <section class="shopping-section" style="flex-grow: 1;">
                <form class="shopping-form" onsubmit="addNewItem(event)">
                    <input type="text" id="itemInput" class="shopping-input" placeholder="Add an item to the list..." autocomplete="off">
                    <button type="submit" class="add-item-btn"><i class="fas fa-plus"></i> Add</button>
                </form>

                <ul id="shoppingList" class="shopping-list">
                    </ul>
            </section>
        </main>
    </div>

    <script>
        // Inline Sidebar Toggle Controller UI Handlers
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('sidebarToggle');
        const contentToggleBtn = document.getElementById('contentMenuToggle');

        function toggleSidebar() {
            sidebar.classList.toggle('collapsed');
        }

        toggleBtn.addEventListener('click', toggleSidebar);
        contentToggleBtn.addEventListener('click', toggleSidebar);

        // Core List Application State Logic
        let shoppingItems = JSON.parse(localStorage.getItem('familyShoppingItems')) || [];

        function renderList() {
            const listEl = document.getElementById('shoppingList');
            listEl.innerHTML = '';
            shoppingItems.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = `shopping-item ${item.checked ? 'checked' : ''}`;
                li.onclick = () => toggleItem(index);
                
                li.innerHTML = `
                    <div class="checkbox-container">
                        <div class="custom-checkbox">
                            <i class="fas fa-check"></i>
                        </div>
                        <span class="item-text">${item.text}</span>
                    </div>
                `;
                listEl.appendChild(li);
            });
        }

        function addNewItem(e) {
            e.preventDefault();
            const input = document.getElementById('itemInput');
            const text = input.value.trim();
            if (text) {
                shoppingItems.push({ text: text, checked: false });
                saveAndRender();
                input.value = '';
            }
        }

        function toggleItem(index) {
            shoppingItems[index].checked = !shoppingItems[index].checked;
            saveAndRender();
        }

        function clearChecked() {
            shoppingItems = shoppingItems.filter(item => !item.checked);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('familyShoppingItems', JSON.stringify(shoppingItems));
            renderList();
        }

        // Initial Run load items
        renderList();
    </script>
</body>
</html>
