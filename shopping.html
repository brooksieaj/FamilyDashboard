<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Dashboard - Shopping List</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <div class="dashboard-container">
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <button id="sidebarToggle" class="icon-btn"><i class="fas fa-bars"></i></button>
                <span class="sidebar-title menu-text">Family Hub</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html"><i class="fas fa-calendar-alt"></i><span class="menu-text">Calendar</span></a></li>
                <li><a href="meals.html"><i class="fas fa-utensils"></i><span class="menu-text">Meals</span></a></li>
                <li class="active"><a href="shopping.html"><i class="fas fa-shopping-basket"></i><span class="menu-text">Shopping List</span></a></li>
                <li><a href="settings.html"><i class="fas fa-cog"></i><span class="menu-text">Settings</span></a></li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="content-header" style="padding: 20px; display: flex; align-items: center; gap: 12px;">
                <button id="contentMenuToggle" class="icon-btn hide-on-desktop"><i class="fas fa-bars"></i></button>
                <h1>Weekly Grocery & Shopping List</h1>
            </header>

            <div id="shopping-list-container" class="shopping-content-area" style="padding: 0 20px;">
                
                <div class="shopping-input-group" style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <input 
                        type="text" 
                        id="shopping-item-input" 
                        placeholder="Add an item (e.g., Almond Milk, Apples)..." 
                        style="flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;"
                    >
                    <button 
                        id="add-item-btn" 
                        style="padding: 12px 20px; background-color: #4285f4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;"
                    >
                        <i class="fas fa-plus"></i> Add
                    </button>
                </div>

                <div class="shopping-actions" style="margin-bottom: 15px; text-align: right;">
                    <button 
                        id="clear-completed-btn" 
                        style="padding: 8px 15px; background-color: #f4f4f4; color: #333; border: 1px solid #ddd; border-radius: 4px; cursor: pointer;"
                    >
                        <i class="fas fa-broom"></i> Clear Completed
                    </button>
                </div>

                <ul 
                    id="shopping-list" 
                    style="list-style: none; padding: 0; margin: 0; background: white; border: 1px solid #ddd; border-radius: 4px;"
                >
                    </ul>

            </div>
        </main>
    </div>
</body>
</html>
