<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Board - Meals</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for matching dashboard icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Meal Specific Layout Constraints */
        .meal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            background-color: #ddd;
            border: 2px solid #333;
            flex-grow: 1;
            padding: 4px;
            box-sizing: border-box;
        }

        .meal-day-card {
            background: white;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-sizing: border-box;
        }

        .meal-day-header {
            font-weight: bold;
            font-size: 1.15rem;
            color: white;
            background-color: #333;
            text-align: center;
            padding: 8px 0;
            border-radius: 4px;
            margin: 0;
        }

        .meal-input {
            width: 100%;
            flex-grow: 1;
            border: 1px dashed #ccc;
            border-radius: 6px;
            padding: 10px;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            outline: none;
            box-sizing: border-box;
            background-color: #fffdf5;
            transition: all 0.2s ease;
        }

        .meal-input:focus {
            border: 2px solid #4285f4;
            background-color: #white;
            box-shadow: inset 0 0 5px rgba(66, 133, 244, 0.1);
        }
    </style>
</head>
<body>

    <!-- Retractable Side Menu -->
    <nav id="sidebar" class="sidebar collapsed">
        <div class="sidebar-header">
            <button id="sidebarToggle" class="icon-btn"><i class="fas fa-bars"></i></button>
            <span class="sidebar-title">Family Hub</span>
        </div>
        <ul class="sidebar-menu">
            <li>
                <a href="index.html">
                    <i class="fas fa-calendar-alt"></i>
                    <span class="menu-text">Calendar</span>
                </a>
            </li>
            <li class="active">
                <a href="meals.html">
                    <i class="fas fa-utensils"></i>
                    <span class="menu-text">Meals</span>
                </a>
            </li>
        </ul>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content" style="height: 100vh; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column;">
        <header class="controls" style="margin-bottom: 15px; flex-shrink: 0;">
            <div class="header-left">
                <button id="contentMenuToggle" class="icon-btn hide-on-desktop"><i class="fas fa-bars"></i></button>
                <h1>Meal Planner</h1>
            </div>
        </header>
        
        <!-- Monday to Sunday Planner Grid -->
        <div class="meal-grid">
            <!-- Monday -->
            <div class="meal-day-card">
                <h3 class="meal-day-header">Mon</h3>
                <textarea id="meal-mon" class="meal-input" placeholder="What's for dinner?"></textarea>
            </div>
            <!-- Tuesday -->
            <div class="meal-day-card">
                <h3 class="meal-day-header">Tue</h3>
                <textarea id="meal-tue" class="meal-input" placeholder="What's for dinner?"></textarea>
            </div>
            <!-- Wednesday -->
            <div class="meal-day-card">
                <h3 class="meal-day-header">Wed</h3>
                <textarea id="meal-wed" class="meal-input" placeholder="What's for dinner?"></textarea>
            </div>
            <!-- Thursday -->
            <div class="meal-day-card">
                <h3 class="meal-day-header">Thu</h3>
                <textarea id="meal-thu" class="meal-input" placeholder="What's for dinner?"></textarea>
            </div>
            <!-- Friday -->
            <div class="meal-day-card">
                <h3 class="meal-day-header">Fri</h3>
                <textarea id="meal-fri" class="meal-input" placeholder="What's for dinner?"></textarea>
            </div>
            <!-- Saturday -->
            <div class="meal-day-card">
                <h3 class="meal-day-header">Sat</h3>
                <textarea id="meal-sat" class="meal-input" placeholder="What's for dinner?"></textarea>
            </div>
            <!-- Sunday -->
            <div class="meal-day-card">
                <h3 class="meal-day-header">Sun</h3>
                <textarea id="meal-sun" class="meal-input" placeholder="What's for dinner?"></textarea>
            </div>
        </div>
    </main>

    <script>
        // Sidebar Navigation controls
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('sidebarToggle');
        const contentToggleBtn = document.getElementById('contentMenuToggle');

        function toggleSidebar() {
            sidebar.classList.toggle('collapsed');
        }

        toggleBtn.addEventListener('click', toggleSidebar);
        contentToggleBtn.addEventListener('click', toggleSidebar);

        // Constant Edit Engine: Auto-load and Auto-save fields to LocalStorage
        const days = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];

        window.onload = () => {
            days.forEach(day => {
                const textarea = document.getElementById(`meal-${day}`);
                
                // Load saved plan if it exists
                const savedMeal = localStorage.getItem(`familyMeal_${day}`);
                if (savedMeal) {
                    textarea.value = savedMeal;
                }

                // Listen for changes and save immediately on keystroke
                textarea.addEventListener('input', (e) => {
                    localStorage.setItem(`familyMeal_${day}`, e.target.value);
                });
            });
        };
    </script>
</body>
</html>
