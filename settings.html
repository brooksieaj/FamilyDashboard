<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Hub - Settings</title>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Shared Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        
        <!-- SIDEBAR NAVIGATION DRAWER -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <button id="sidebarToggle" class="icon-btn"><i class="fas fa-bars"></i></button>
                <span class="sidebar-title menu-text">Family Hub</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html"><i class="fas fa-calendar-alt"></i><span class="menu-text">Calendar</span></a></li>
                <li><a href="meals.html"><i class="fas fa-utensils"></i><span class="menu-text">Meals</span></a></li>
                <li><a href="shopping.html"><i class="fas fa-shopping-basket"></i><span class="menu-text">Shopping List</span></a></li>
                <li class="active"><a href="settings.html"><i class="fas fa-cog"></i><span class="menu-text">Settings</span></a></li>
            </ul>
        </aside>

        <!-- MAIN WORK AREA CONTENT -->
        <main class="main-content">
            <header class="content-header" style="padding: 20px; display: flex; align-items: center; gap: 12px;">
                <button id="contentMenuToggle" class="icon-btn hide-on-desktop"><i class="fas fa-bars"></i></button>
                <h1>Settings</h1>
            </header>

            <!-- Settings Content Container -->
            <section style="padding: 20px;">
                <div class="blank-state-card">
                    <span class="placeholder-icon"><i class="fas fa-sliders-h"></i></span>
                    <p>App Settings Options Coming Soon.</p>
                </div>
            </section>
        </main>

    </div>

    <script>
        // Sidebar Collapsing Logic
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('sidebarToggle');
        const contentToggleBtn = document.getElementById('contentMenuToggle');

        function toggleSidebar() {
            sidebar.classList.toggle('collapsed');
        }

        if (toggleBtn) toggleBtn.addEventListener('click', toggleSidebar);
        if (contentToggleBtn) contentToggleBtn.addEventListener('click', toggleSidebar);
    </script>
</body>
</html>
