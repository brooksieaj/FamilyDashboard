<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Board Dashboard - Settings</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Unified Flex Structural Wrapper -->
    <div class="dashboard-container">

        <!-- Retractable Side Menu -->
        <nav id="sidebar" class="sidebar collapsed">
            <div class="sidebar-header">
                <button id="sidebarToggle" class="icon-btn"><i class="fas fa-bars"></i></button>
                <span class="sidebar-title">Family Hub</span>
            </div>
            <ul class="sidebar-menu">
                <li>
                    <a href="index.html">
                        <i class="fas fa-calendar-alt"></i>
                        <span class="menu-text">Calendar</span>
                    </a>
                </li>
                <li>
                    <a href="meals.html">
                        <i class="fas fa-utensils"></i>
                        <span class="menu-text">Meals</span>
                    </a>
                </li>
                <li>
                    <a href="shopping.html">
                        <i class="fas fa-shopping-basket"></i>
                        <span class="menu-text">Shopping List</span>
                    </a>
                </li>
                <li class="active">
                    <a href="settings.html">
                        <i class="fas fa-cog"></i>
                        <span class="menu-text">Settings</span>
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Main Content Area Wrapper -->
        <main class="main-content">
            <section class="shopping-section"> <!-- Reusing layout section class padding -->
                <div class="controls">
                    <div class="header-left">
                        <button id="contentMenuToggle" class="icon-btn hide-on-desktop"><i class="fas fa-bars"></i></button>
                        <h1>Settings</h1>
                    </div>
                </div>

                <!-- Google Authentication Interface Card -->
                <div class="blank-state-card">
                    <span class="placeholder-icon"><i class="fab fa-google"></i></span>
                    <h2>Account Connection</h2>
                    <p style="margin-bottom: 25px;">Sign in with your Google account to sync your family calendars seamlessly.</p>
                    
                    <div style="display: flex; justify-content: center; gap: 15px;">
                        <button id="auth-button" onclick="handleAuthClick()">Sign In to Google</button>
                        <button id="signout-button" class="clear-bought-btn hidden" onclick="handleSignoutClick()">Sign Out</button>
                    </div>
                </div>
            </section>
        </main>
        
    </div>

    <!-- Asynchronous Google API & Architecture Engines -->
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
    <script src="script.js"></script>
</body>
</html>
